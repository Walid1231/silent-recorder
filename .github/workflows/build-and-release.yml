name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger this workflow when a new version tag is pushed (e.g. v1.0.1)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Decode google-services.json
        run: |
          cat << 'EOF' > android/app/google-services.json
          ${{ secrets.GOOGLE_SERVICES_JSON }}
          EOF

      - name: Patch phone_state_background namespace
        run: |
          BUILD_FILE=$(find ~ /opt -name "build.gradle" -path "*/phone_state_background-0.0.4/android/build.gradle" 2>/dev/null | head -n 1)
          if [ -n "$BUILD_FILE" ]; then
            sed -i 's/android {/android {\n    namespace "me.sodipto.phone_state_background"/' "$BUILD_FILE"
            echo "Patched $BUILD_FILE"
          else
            echo "Error: Could not find phone_state_background build.gradle"
            exit 1
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/app-release.apk"
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "Release ${{ github.ref_name }}"
          body: "Automated release via GitHub Actions."
          draft: false
          prerelease: false
